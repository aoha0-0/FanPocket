require:
  - rubocop-rails
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.2
  Exclude:
    - 'bin/**/*'
    - 'config/**/*'
    - 'db/**/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'Gemfile'

Style/AsciiComments:
  Enabled: false

Style/Documentation:
  Enabled: false
Metrics/BlockLength:
  Exclude:
    - 'lib/tasks/**/*.rake'